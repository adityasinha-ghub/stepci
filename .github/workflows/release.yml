name: Release

# Cut a release by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Builds a binary per platform and attaches them to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: tar -C target/${{ matrix.target }}/release -czf stepci-${{ matrix.target }}.tar.gz stepci
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: stepci-${{ matrix.target }}.tar.gz
